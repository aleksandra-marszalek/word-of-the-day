AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Word of the Day API - JVM

Parameters:
  RedisUri:
    Type: String
    NoEcho: true

Globals:
  Function:
    Runtime: java21
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        MICRONAUT_ENVIRONMENTS: prod
        REDIS_URI: !Ref RedisUri

Resources:
  WordOfDayFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.marszalek.FunctionRequestHandler
      CodeUri: target/word-of-the-day-0.1.jar
      Policies:
        - DynamoDBCrudPolicy:
            TableName: word-of-the-day
      Events:
        GetWord:
          Type: Api
          Properties:
            Path: /api/v1/word/today
            Method: get
        PostGuess:
          Type: Api
          Properties:
            Path: /api/v1/word/guess
            Method: post

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"